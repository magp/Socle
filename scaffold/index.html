<!DOCTYPE html>
<html lang="%%LANG%%">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="%%THEME_COLOR_LIGHT%%" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="%%THEME_COLOR_DARK%%" media="(prefers-color-scheme: dark)" />
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        var dark = t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      })();
    </script>
    <title>%%APP_NAME%%</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&display=swap" />
    <link rel="stylesheet" href="_lib/core/styles/tokens.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background-color: var(--color-bg);
        background-image: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(232,130,74,0.06) 0%, transparent 70%);
        color: var(--color-text-primary);
        font-family: var(--font-family);
        font-size: var(--font-size-body);
        line-height: var(--line-height-normal);
        min-block-size: 100dvh;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.04;
        background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <sw-manager base-path="/" app-version="__APP_VERSION__"></sw-manager>
    <update-banner hidden></update-banner>
    %%APP_HEADER_ELEMENT%%
    <app-router></app-router>
    <script type="module" src="%%MAIN_JS%%"></script>
  </body>
</html>
