<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F5F2EE" />
    <title>Socle Reference App</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="_lib/core/styles/tokens.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: var(--color-bg);
        color: var(--color-text-primary);
        font-family: var(--font-family);
        font-size: var(--font-size-body);
        line-height: var(--line-height-normal);
        min-block-size: 100dvh;
      }
    </style>
  </head>
  <body>
    <sw-manager base-path="/" app-version="__APP_VERSION__"></sw-manager>
    <update-banner hidden></update-banner>
    <app-router></app-router>
    <script type="module" src="%%MAIN_JS%%"></script>
  </body>
</html>
